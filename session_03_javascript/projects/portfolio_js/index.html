<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Portfolio của tôi</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <button id="theme-toggle" class="theme-toggle">
        <span class="theme-icon light-icon">☀️</span>
        <span class="theme-icon dark-icon">🌙</span>
    </button>

    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="web">Web</button>
        <button class="filter-btn" data-filter="mobile">Mobile</button>
    </div>

    <div class="portfolio-grid">
        <div class="portfolio-item" data-category="web">
            <img src="project1.jpg" alt="Project 1" data-full="project1-full.jpg" class="lightbox-trigger">
            <h5>Web Project 1</h5>
        </div>
    </div>

    <div id="lightbox" class="lightbox-overlay">
        <button class="lightbox-close">&times;</button>
        <img id="lightbox-img" class="lightbox-image" src="" alt="Full view">
    </div>

    <form id="contact-form">
        <input type="text" id="name" placeholder="Name" required>
        <span class="error-message" id="name-error"></span>

        <input type="email" id="email" placeholder="Email" required>
        <span class="error-message" id="email-error"></span>

        <textarea id="message" placeholder="Message"></textarea>
        <button type="submit">Send Message</button>
    </form>
    <div id="success-message" hidden>Message sent successfully!</div>
    <section id="todo-section" class="todo-container">
        <h2>Quản lý công việc</h2>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Nhập việc cần làm...">
            <button id="addBtn">Thêm</button>
        </div>

        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="active">Chưa xong</button>
            <button class="filter-btn" data-filter="completed">Đã xong</button>
        </div>

        <ul id="todoList">
        </ul>
    </section>
    <section id="movie-search-section">
        <h2>Tìm kiếm phim</h2>
        <input type="text" id="movieInput" placeholder="Nhập tên phim...">
        <div id="movieGrid" class="movie-grid"></div>
        <div id="pagination" class="pagination"></div>
    </section>
    <section id="shopping-cart-section">
        <h2>Sản phẩm công nghệ</h2>
        <div id="productGrid" class="product-grid"></div>

        <div id="cartSidebar" class="cart-sidebar">
            <button id="closeCart">Đóng</button>
            <ul id="cartItems"></ul>
            <div id="cartTotal"></div>
        </div>
    </section>
    <script src="js/todo-app.js"></script>
    <script src="js/portfolio-filter.js"></script>
    <script src="js/lightbox.js"></script>
    <script src="js/form-validation.js"></script>
    <script src="js/theme-toggle.js"></script>
</body>

</html>
