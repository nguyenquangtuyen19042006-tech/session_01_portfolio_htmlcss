<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Portfolio của tôi</title>
</head>

<body>

    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="web">Web</button>
        <button class="filter-btn" data-filter="mobile">Mobile</button>
    </div>

    <div class="portfolio-grid">
        <div class="portfolio-item" data-category="web">Web Project 1</div>
        <div class="portfolio-item" data-category="mobile">Mobile Project 1</div>
    </div>

    <div id="lightbox" class="lightbox-overlay">
        <button class="lightbox-close">&times;</button>
        <button class="lightbox-prev">&#10094;</button>
        <button class="lightbox-next">&#10095;</button>
        <img id="lightbox-img" class="lightbox-image" src="" alt="Portfolio Image">
        <div class="lightbox-caption">
            <h3 id="lightbox-title">Project Title</h3>
            <p id="lightbox-desc">Project description</p>
        </div>
    </div>
    <form id="contact-form" class="contact-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
            <span class="error-message" id="name-error"></span>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
            <span class="error-message" id="email-error"></span>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <span class="error-message" id="message-error"></span>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
    </form>

    <div id="success-message" class="success-message" hidden>
        Message sent successfully!
    </div>
    <script src="js/portfolio-filter.js"></script>
</body>

</html>
