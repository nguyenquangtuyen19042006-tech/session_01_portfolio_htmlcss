<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Hello JavaScript</title>
</head>

<body>
    <h1>Bài tập Session 3</h1>
    <script>
        console.log("Xin chào thế giới!");
        console.log("Tôi đang học JavaScript");
        console.log(2026);
        // [STATE] Variables and Data Types
        let ten = "Minh";
        const NAM = 2026;
        let isStudent = true;

        // [STATE] Template Literal
        console.log(`Chào ${ten}, năm nay là ${NAM}`);

        // [STATE] Math and Logic
        let a = 15, b = 4;
        console.log(`Kết quả: ${a + b}`);
        let check = (a > 10 && b < 5); // true
        console.log("Điều kiện:", check);
        // [FEATURE] Arrays and Objects
        const sinhVien = { hoTen: "Minh", tuoi: 20 };
        const monHoc = ["Toán", "Lý", "Hóa"];

        // [FEATURE] Function
        const tinhTong = (a, b) => a + b;
        console.log("Mảng môn học:", monHoc);
        console.log("Tổng điểm:", tinhTong(8, 9));
    </script>

</body>

</html>
